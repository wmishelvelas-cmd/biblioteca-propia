<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="ui-container">
            <div class="score-board">
                <div class="stat">
                    <span class="label">Puntos:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Monedas:</span>
                    <span id="coins" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Nivel:</span>
                    <span id="level" class="value">1</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="gameOver" class="modal hidden">
            <div class="modal-content">
                <h1>¡GAME OVER!</h1>
                <div class="final-stats">
                    <p>Puntos Finales: <span id="finalScore">0</span></p>
                    <p>Monedas Recolectadas: <span id="finalCoins">0</span></p>
                    <p>Nivel Alcanzado: <span id="finalLevel">1</span></p>
                </div>
                <button id="restartBtn" class="btn">Jugar de Nuevo</button>
            </div>
        </div>

        <div id="startMenu" class="modal">
            <div class="modal-content">
                <h1>SUBWAY SURFERS</h1>
                <p class="subtitle">¡Corre por las vías del metro!</p>
                <div class="instructions">
                    <h2>Controles:</h2>
                    <p>⬅️ / ➡️ - Cambiar de carril</p>
                    <p>⬆️ - Saltar sobre obstáculos</p>
                    <p>⬇️ - Deslizarse bajo barras</p>
                    <p><strong>Móvil:</strong> Toca y arrastra</p>
                </div>
                <button id="startBtn" class="btn primary">COMENZAR</button>
            </div>
        </div>

        <div class="power-up-indicator hidden" id="powerUpIndicator">
            <span id="powerUpText"></span>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
